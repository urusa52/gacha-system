<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>미완(未完)의 서고</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600&family=Nanum+Pen+Script&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/desk.css" />
  <link rel="stylesheet" href="./styles/page.css" />
</head>
<body>
  <header class="topbar">
    <h1>미완(未完)의 서고</h1>
    <p class="subtitle">결말을 갖지 못한 이야기들이 잠든 곳</p>
    <div class="meta">
      <span class="currency" id="currency"></span>
      <div class="pity">
        <div class="pity-track"><div class="pity-fill" id="pity-fill"></div></div>
        <span class="pity-label" id="pity-label"></span>
      </div>
      <span class="library-count" id="library-count"></span>
    </div>
  </header>

  <main>
    <p class="notice" id="notice"></p>
    <section class="desk" id="desk" aria-label="복원 책상"></section>
    <div class="summary hidden" id="summary" role="status"></div>
    <div class="controls">
      <button id="btn-single"></button>
      <button id="btn-multi"></button>
      <button id="btn-skip" class="btn-skip hidden"></button>
    </div>
  </main>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
